# ============================================
# Docker Compose for Mauze Tahfeez
# One-command production deployment
# ============================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mauze-tahfeez-web
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
