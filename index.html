<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mauze Tahfeez" />
    <meta name="theme-color" content="#c5a059" />
    <meta name="description" content="Educational portal for Quran memorization and Islamic learning" />
    <meta name="keywords" content="Quran, memorization, Islamic education, tahfeez" />
    <link rel="apple-touch-icon" href="/main logo.jpg" />
    <link rel="icon" type="image/jpeg" href="/main logo.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="/Qilka-Bold.otf" as="font" type="font/otf" crossorigin="anonymous">
    <link rel="preload" href="/Child-Hood.otf" as="font" type="font/otf" crossorigin="anonymous">
    <link rel="preload" href="/fonts/al-kanz.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <link rel="preload" href="/Kanz%20al%20Marjaan/kanz-al-marjaan-webfont.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <title>Mauze Tahfeez - Educational Portal</title>
    <script>
      (async () => {
        try {
          if (!('serviceWorker' in navigator)) return;

          const cleanupFlag = '__mauze_tahfeez_sw_cleanup__';
          if (sessionStorage.getItem(cleanupFlag) === '1') {
            sessionStorage.removeItem(cleanupFlag);
            return;
          }

          const registrations = await navigator.serviceWorker.getRegistrations();
          if (!registrations.length) return;

          sessionStorage.setItem(cleanupFlag, '1');
          await Promise.allSettled(registrations.map((registration) => registration.unregister()));

          if ('caches' in window) {
            const cacheKeys = await caches.keys();
            await Promise.allSettled(cacheKeys.map((key) => caches.delete(key)));
          }

          const url = new URL(window.location.href);
          url.searchParams.set('fresh', '1');
          window.location.replace(url.toString());
        } catch (error) {
          console.warn('Service worker cleanup skipped:', error);
        }
      })();
    </script>
  </head>
  <body>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
