<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <script>
      window.OneSignal = window.OneSignal || [];
      OneSignal.push(function() {
        OneSignal.init({
          appId: "41019813-9c1b-47fe-83bd-87ac1e1b7021",
          allowLocalhostAsSecureOrigin: true,
          serviceWorkerPath: '/OneSignalSDKWorker.js',
          notifyButton: {
            enable: true, /* Floating Bell is the absolute fallback */

            size: 'medium',
            theme: 'default',
            colors: {
              'circle.background': '#c5a059',
              'pulse.color': '#ffffff',
              'dialog.button.background': '#c5a059'
            }
          },
          promptOptions: {
            slidedown: {
              enabled: true,
              autoPrompt: true,
              timeDelay: 2
            }
          }
        });
      });
    </script>
